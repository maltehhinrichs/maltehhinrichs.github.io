name: Weekly Presentations Extraction & Map Generation

on:
  schedule:
    - cron: '0 8 * * 1' # Every Monday at 08:00 UTC
  workflow_dispatch:

jobs:
  update-presentations:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' 
          cache-dependency-path: assets/python/python-requirements.txt
      
      - name: Install dependencies
        run: pip install -r assets/python/python-requirements.txt

      - name: Extract presentations
        run: python assets/python/extract_presentations.py
        
      # Generate the map data in the same workflow so it isn't blocked!
      - name: Generate presentation map
        run: python assets/python/generate_map.py

      - name: Commit and push if changed
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          # Add both the updated markdown and javascript map script to the commit
          git add _pages/presentations.md talkmap/org-locations.js || echo "No changes to commit"
          git diff-index --quiet HEAD || git commit -m "Automated update of presentations list and map"
          git push origin HEAD:${GITHUB_REF_NAME}
